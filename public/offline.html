<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GymTrack Pro - Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #0f1117;
        color: #ffffff;
      }
      .card {
        text-align: center;
        padding: 32px;
        max-width: 420px;
        margin: 0 12px;
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 18px;
        box-shadow: 0 16px 38px rgba(0,0,0,0.32);
        background: linear-gradient(145deg, #191b22, #121316);
      }
      .icon {
        font-size: 62px;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 14px;
        font-size: 28px;
      }
      p { margin: 0 0 18px; color: #d0d4de; }
      button {
        border: none;
        background: #f8e71c;
        color: #0f1117;
        font-weight: 700;
        border-radius: 12px;
        cursor: pointer;
        padding: 11px 16px;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🏋️‍♀️</div>
      <h1>You're offline</h1>
      <p>GymTrack Pro saat ini offline, tapi semua data tetap aman di penyimpanan lokal.</p>
      <p>Coba lagi setelah koneksi internet kembali.</p>
      <button onclick="location.reload()">Coba Lagi</button>
    </div>
  </body>
</html>
